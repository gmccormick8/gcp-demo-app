apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mario.fullname" . }}-hpa
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mario.fullname" . }}
  minReplicas: {{.Values.autoscaling.minReplicas}}
  maxReplicas: {{.Values.autoscaling.maxReplicas}}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{.Values.autoscaling.cpuUtilization}}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{.Values.autoscaling.scaleUpStabilization}}
    scaleDown:
      stabilizationWindowSeconds: {{.Values.autoscaling.scaleDownStabilization}}